services:
  postgres:
    image: postgres:16-alpine
    container_name: minitasks-postgres
    environment:
      POSTGRES_DB: minitasks
      POSTGRES_USER: minitasks
      POSTGRES_PASSWORD: minitasks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minitasks -d minitasks"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: minitasks-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/minitasks
      SPRING_DATASOURCE_USERNAME: minitasks
      SPRING_DATASOURCE_PASSWORD: minitasks
    ports:
      - "8080:8080"

volumes:
  postgres_data:
