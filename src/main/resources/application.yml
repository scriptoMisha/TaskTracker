spring:
  application:
    name: mini-tasks
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/minitasks}
    username: ${SPRING_DATASOURCE_USERNAME:minitasks}
    password: ${SPRING_DATASOURCE_PASSWORD:minitasks}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    access-ttl: ${APP_JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${APP_JWT_REFRESH_TTL:P30D}
    issuer: ${APP_JWT_ISSUER:mini-tasks}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
